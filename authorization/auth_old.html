<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід та Реєстрація — CleanHome Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth_style.css">
</head>
<body>

<header class="main-header">
    <div class="header-top">
        <div class="container">
            <a href="../main/index.html" class="logo">Clean<span>Home Premium</span></a>
            <div class="user-actions">
                <a href="../koshik/cart.html" class="icon-link">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span class="count">0</span>
                </a>
                <a href="auth.html" class="auth-btn active-auth">Вхід</a>
            </div>
        </div>
    </div>
    <nav class="main-nav">
        <div class="container">
            <ul>
                <li><a href="../main/index.html">Головна</a></li>
                <li><a href="../brands/brands.html">Бренди</a></li>
                <li><a href="../dostavka/oplata.html">Доставка</a></li>
                <li><a href="../kontakti/kontakti.html">Контакти</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="auth-container">
    <div class="auth-box">
        <div class="auth-tabs">
            <button class="tab-btn active" id="btn-login">Вхід</button>
            <button class="tab-btn" id="btn-register">Реєстрація</button>
        </div>

        <form id="loginForm" class="auth-form active-form">
            <h2>З поверненням!</h2>
            <p>Введіть свої дані для входу</p>
            <div class="input-wrap">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="submit-btn">Увійти</button>
            <a href="#" class="forgot-pass">Забули пароль?</a>
        </form>

        <form id="registerForm" class="auth-form">
            <h2>Створити акаунт</h2>
            <p>Приєднуйтесь до CleanHome Premium</p>
            <div class="input-wrap">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="regName" placeholder="Ваше ім'я" required>
            </div>
            <div class="input-wrap">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>
            <div class="input-wrap">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="regPhone" placeholder="Номер телефону" required>
            </div>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="regPass" placeholder="Пароль" required>
            </div>
            <div class="input-wrap">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="password" id="regPassConfirm" placeholder="Підтвердіть пароль" required>
            </div>
            <button type="submit" class="submit-btn">Зареєструватися</button>
        </form>
    </div>
</main>

<footer class="footer">
    <p>CleanHome Premium © 2026 | Студент: Шелест Ігор ІТ-33</p>
</footer>

<script src="auth_script.js"></script>
</body>
</html>
